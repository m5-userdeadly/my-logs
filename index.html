<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelLog HK</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #0066b2;
            --bg-light: #f5f5f7;
            --card-white: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
            --border-color: #dddddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 40px;
        }

        header {
            background-color: var(--card-white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        .header-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .page-container {
            padding: 0 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Portal Quick Links Card */
        .portal-card {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        
        .portal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .portal-link-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
        }

        .portal-primary {
            background: var(--primary-blue);
            color: white;
        }

        .portal-secondary {
            background: #e3f2fd;
            color: var(--primary-blue);
        }

        /* Form Layout */
        .inline-form-card {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .inline-form-card h3 {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .form-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-field-box {
            display: flex;
            flex-direction: column;
        }

        .form-field-box label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .form-field-box input, .form-field-box select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: #fafafa;
        }

        .unified-submit-btn {
            background: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Calendar */
        .calendar-box {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .cal-day {
            padding: 10px 0;
            font-size: 12px;
            border-radius: 6px;
            background: #f9f9f9;
            cursor: pointer;
        }

        .cal-header { font-weight: bold; background: none; cursor: default; }
        .has-fuel { background: #e3f2fd; border-bottom: 3px solid var(--primary-blue); font-weight: bold; }
        .has-exp { background: #e8f5e9; border-bottom: 3px solid #2e7d32; font-weight: bold; }
        .has-both { background: #fff3e0; border-bottom: 3px solid #f57c00; font-weight: bold; }
        .cal-day.selected-date-focus { outline: 2px solid #333333; outline-offset: -1px; }

        /* Day Details */
        .inspector-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .inspector-title {
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .inspector-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 6px 0;
        }

        /* Chart */
        .chart-card {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .chart-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-badge {
            background: #e3f2fd;
            color: var(--primary-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
        .no-data-msg {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 14px;
        }

        /* Dynamic Mileage Tracker Utility CSS */
        .utility-card {
            background: #fffde7;
            border: 1px solid #fff59d;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
        }
        .util-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .util-res-box {
            background: #ffffff;
            border: 1px solid #fff59d;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">FuelLog & Expense Ledger</div>
    </header>

    <div class="page-container">

        <div class="portal-card">
            <div class="portal-header">⛽ <span>Consumer Council Fuel Portals</span></div>
            <div class="portal-grid">
                <a href="https://oil-price.consumer.org.hk/en" target="_blank" class="portal-link-btn portal-primary">
                    📊 Compare Prices ↗
                </a>
                <a href="https://oil-price.consumer.org.hk/en/calculator" target="_blank" class="portal-link-btn portal-secondary">
                    🧮 Calculator Tool ↗
                </a>
            </div>
        </div>
        
        <div class="inline-form-card">
            <h3>Quick Record Transaction</h3>
            <form id="unifiedLogForm" onsubmit="handleUnifiedSubmit(event)">
                <div class="form-row-grid">
                    <div class="form-field-box">
                        <label>Log Type</label>
                        <select id="log-type" onchange="toggleFormFields(this.value)">
                            <option value="Expense_Log">🛒 General Expense</option>
                            <option value="Refuel_Log">⛽ Fuel Refuel</option>
                        </select>
                    </div>
                    <div class="form-field-box">
                        <label>Date</label>
                        <input type="date" id="log-date" class="auto-date" required>
                    </div>
                </div>

                <div id="section-expense-inputs">
                    <div class="form-row-grid">
                        <div class="form-field-box">
                            <label>Item Description</label>
                            <input type="text" id="exp-name" placeholder="e.g., Tunnel toll, Parking">
                        </div>
                        <div class="form-field-box">
                            <label>Category</label>
                            <select id="exp-category">
                                <option value="Food">Food</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Subscription">Subscription</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="section-fuel-inputs" style="display: none;">
                    <div class="form-row-grid">
                        <div class="form-field-box">
                            <label>Volume (Litres)</label>
                            <input type="number" step="0.01" id="fuel-litres" placeholder="0.00">
                        </div>
                        <div class="form-field-box">
                            <label>Company Brand</label>
                            <select id="fuel-station">
                                <option value="Shell">Shell</option>
                                <option value="Caltex">Caltex</option>
                                <option value="Esso">Esso</option>
                                <option value="Sinopec">Sinopec</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-field-box" style="margin-bottom: 12px;">
                    <label>Total Value ($HKD)</label>
                    <input type="number" step="0.1" id="log-amount-cost" placeholder="$0.0" required>
                </div>

                <button type="submit" class="unified-submit-btn">POST TO DATABASE</button>
            </form>
        </div>

        <div class="calendar-box">
            <h3 id="calendar-month-year">Month Year</h3>
            <div class="calendar-grid" id="calendar-grid-days"></div>
        </div>

        <div class="inspector-card" id="inspector-card" style="display: none;">
            <div class="inspector-title">
                <span id="inspector-date-label">Selected Date</span>
                <span id="inspector-day-total" style="color: var(--primary-blue); font-weight: bold;">$0.0</span>
            </div>
            <div id="inspector-list-container"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">
                <span>Monthly Overview Breakdown</span>
                <span class="total-badge" id="chart-total-badge">$0.00</span>
            </div>
            <div id="donut-container">
                <canvas id="donutChart" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="utility-card">
            <h4 style="font-size: 14px; font-weight: bold; color: #5d4037;">⛽ Quick Efficiency Calculator</h4>
            <div class="form-row-grid" style="margin-top:8px; margin-bottom:8px;">
                <div class="form-field-box">
                    <label style="color:#5d4037;">Distance Driven (km)</label>
                    <input type="number" id="calc-km" placeholder="e.g., 450" oninput="calculateTripEfficiency()">
                </div>
                <div class="form-field-box">
                    <label style="color:#5d4037;">Cost of Refuel ($)</label>
                    <input type="number" id="calc-cost" placeholder="e.g., 800" oninput="calculateTripEfficiency()">
                </div>
            </div>
            <div class="form-field-box" style="margin-bottom: 10px;">
                <label style="color:#5d4037;">Litres Filled (L)</label>
                <input type="number" step="0.01" id="calc-litres" placeholder="e.g., 38.5" oninput="calculateTripEfficiency()">
            </div>
            <div class="util-grid">
                <div class="util-res-box">Cost: <strong id="res-cost-per-km" style="color:var(--primary-blue)">$0.00</strong> /km</div>
                <div class="util-res-box">Consumption: <strong id="res-km-per-litre" style="color:#2e7d32">0.0</strong> km/L</div>
            </div>
        </div>

    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVEkOqz67hUWG6-ZndWiNS9OMCm_xDoyL5tsynVHdrAyYdlt_WNVY_g_O1aHpZk3KqLw/exec';
        
        let userRecords = { refuels: [], expenses: [] };
        let donutChartInstance = null;
        let selectedDayInteger = null;

        function toggleFormFields(selectedType) {
            if(selectedType === 'Refuel_Log') {
                document.getElementById('section-expense-inputs').style.display = 'none';
                document.getElementById('section-fuel-inputs').style.display = 'block';
            } else {
                document.getElementById('section-expense-inputs').style.display = 'block';
                document.getElementById('section-fuel-inputs').style.display = 'none';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.querySelectorAll('.auto-date').forEach(input => input.value = `${year}-${month}-${day}`);
            
            renderCalendar(today, {}, {});
            fetchAllDataFromSheets();
        });

        function fetchAllDataFromSheets() {
            fetch(GOOGLE_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                userRecords = data;
                processAndRenderData();
                if(selectedDayInteger) inspectSpecificDay(selectedDayInteger);
            })
            .catch(err => {
                console.error("Error linking system database:", err);
                const gridDays = document.getElementById('calendar-grid-days');
                if (gridDays) gridDays.innerHTML = '<div class="no-data-msg">Error loading database components.</div>';
            });
        }

        function handleUnifiedSubmit(event) {
            event.preventDefault();
            const targetSheetName = document.getElementById('log-type').value;
            const dateValue = document.getElementById('log-date').value;
            const totalValue = document.getElementById('log-amount-cost').value;
            let rowData = [];

            if (targetSheetName === 'Refuel_Log') {
                rowData = [dateValue, document.getElementById('fuel-litres').value || '0', totalValue, document.getElementById('fuel-station').value];
            } else {
                rowData = [dateValue, totalValue, document.getElementById('exp-name').value || 'Item', document.getElementById('exp-category').value];
            }

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetSheet: targetSheetName, rowData: rowData })
            })
            .then(() => {
                alert('Success! Saved to Google Sheets.');
                document.getElementById('exp-name').value = '';
                document.getElementById('fuel-litres').value = '';
                document.getElementById('log-amount-cost').value = '';
                fetchAllDataFromSheets();
            })
            .catch(err => alert('Error sending record log: ' + err));
        }

        function processAndRenderData() {
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();

            let fuelDays = {}, expDays = {};
            let categoryTotals = { Fuel: 0, Food: 0, Shopping: 0, Subscription: 0, Others: 0 };
            let hasCurrentMonthData = false;

            if (userRecords.refuels && Array.isArray(userRecords.refuels)) {
                userRecords.refuels.forEach(item => {
                    if (!item.date) return;
                    let d = new Date(item.date.replace(/-/g, '/'));
                    if(!isNaN(d.getTime()) && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                        fuelDays[d.getDate()] = true;
                        categoryTotals.Fuel += parseFloat(item.total || 0);
                        hasCurrentMonthData = true;
                    }
                });
            }

            if (userRecords.expenses && Array.isArray(userRecords.expenses)) {
                userRecords.expenses.forEach(item => {
                    if (!item.date) return;
                    let d = new Date(item.date.replace(/-/g, '/'));
                    if(!isNaN(d.getTime()) && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                        expDays[d.getDate()] = true;
                        let cat = item.category || 'Others';
                        if (cat === 'Misc') cat = 'Others';
                        
                        if(categoryTotals[cat] !== undefined) {
                            categoryTotals[cat] += parseFloat(item.amount || 0);
                        } else {
                            categoryTotals.Others += parseFloat(item.amount || 0);
                        }
                        hasCurrentMonthData = true;
                    }
                });
            }

            renderCalendar(today, fuelDays, expDays);
            renderCharts(categoryTotals, hasCurrentMonthData);
        }

        function renderCalendar(dateObj, fuelDays, expDays) {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('calendar-month-year').innerText = `${months[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
            
            const grid = document.getElementById('calendar-grid-days');
            grid.innerHTML = '';
            
            ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(w => grid.innerHTML += `<div class="cal-day cal-header">${w}</div>`);

            const firstDayIndex = new Date(dateObj.getFullYear(), dateObj.getMonth(), 1).getDay();
            const totalDays = new Date(dateObj.getFullYear(), dateObj.getMonth() + 1, 0).getDate();

            for(let i=0; i<firstDayIndex; i++) { grid.innerHTML += `<div class="cal-day" style="background:none; cursor:default"></div>`; }
            
            for(let day=1; day<=totalDays; day++) {
                let statusClass = "";
                if(fuelDays[day] && expDays[day]) statusClass = "has-both";
                else if(fuelDays[day]) statusClass = "has-fuel";
                else if(expDays[day]) statusClass = "has-exp";
                
                let selectFocusClass = (selectedDayInteger === day) ? 'selected-date-focus' : '';
                grid.innerHTML += `<div class="cal-day ${statusClass} ${selectFocusClass}" onclick="inspectSpecificDay(${day})">${day}</div>`;
            }
        }

        function inspectSpecificDay(dayNumber) {
            selectedDayInteger = dayNumber;
            document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected-date-focus'));
            
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            
            const inspectorBox = document.getElementById('inspector-card');
            const listContainer = document.getElementById('inspector-list-container');
            const dateLabel = document.getElementById('inspector-date-label');
            const totalLabel = document.getElementById('inspector-day-total');

            dateLabel.innerText = `${today.getFullYear()}-${String(currentMonth + 1).padStart(2, '0')}-${String(dayNumber).padStart(2, '0')}`;
            listContainer.innerHTML = '';
            
            let dailyTotalSum = 0;
            let transactionLines = [];

            if (userRecords.refuels && Array.isArray(userRecords.refuels)) {
                userRecords.refuels.forEach(item => {
                    if (!item.date) return;
                    let d = new Date(item.date.replace(/-/g, '/'));
                    if(!isNaN(d.getTime()) && d.getDate() === dayNumber && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                        let cost = parseFloat(item.total || 0);
                        dailyTotalSum += cost;
                        transactionLines.push(`<div class="inspector-item"><span>⛽ Fuel (${item.station || 'Station'}) - ${item.litres || 0}L</span><strong>$${cost.toFixed(1)}</strong></div>`);
                    }
                });
            }

            if (userRecords.expenses && Array.isArray(userRecords.expenses)) {
                userRecords.expenses.forEach(item => {
                    if (!item.date) return;
                    let d = new Date(item.date.replace(/-/g, '/'));
                    if(!isNaN(d.getTime()) && d.getDate() === dayNumber && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                        let cost = parseFloat(item.amount || 0);
                        dailyTotalSum += cost;
                        let categoryText = item.category === 'Misc' ? 'Others' : (item.category || 'Others');
                        transactionLines.push(`<div class="inspector-item"><span>🛒 ${item.item || 'Item'} (${categoryText})</span><strong>$${cost.toFixed(1)}</strong></div>`);
                    }
                });
            }

            totalLabel.innerText = `$${dailyTotalSum.toFixed(1)}`;
            inspectorBox.style.display = 'block';

            if (transactionLines.length === 0) {
                listContainer.innerHTML = '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding:5px 0;">No entries recorded on this calendar date.</div>';
            } else {
                transactionLines.forEach(line => listContainer.innerHTML += line);
            }
        }

        function renderCharts(totals, hasData) {
            if(donutChartInstance) donutChartInstance.destroy();
            const container = document.getElementById('donut-container');
            const topBadge = document.getElementById('chart-total-badge');
            
            const grossSum = totals.Fuel + totals.Food + totals.Shopping + totals.Subscription + totals.Others;
            topBadge.innerText = `$${grossSum.toFixed(2)}`;

            if(!hasData || grossSum === 0) {
                container.innerHTML = '<div class="no-data-msg">No logs recorded yet for this month.</div>';
                return;
            }

            container.innerHTML = '<canvas id="donutChart" width="100" height="100"></canvas>';
            
            donutChartInstance = new Chart(document.getElementById('donutChart'), {
                type: 'pie',
                data: {
                    labels: ['Fuel', 'Food', 'Shopping', 'Sub', 'Others'],
                    datasets: [{
                        data: [totals.Fuel, totals.Food, totals.Shopping, totals.Subscription, totals.Others],
                        backgroundColor: ['#0066b2', '#2e7d32', '#f57c00', '#7b1fa2', '#666666']
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let val = context.raw || 0;
                                    let percentage = ((val / grossSum) * 100).toFixed(1);
                                    return ` ${context.label}: $${val.toFixed(1)} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // MILEAGE ECONOMY METRIC HANDLER LOGIC
        function calculateTripEfficiency() {
            const km = parseFloat(document.getElementById('calc-km').value);
            const cost = parseFloat(document.getElementById('calc-cost').value);
            const litres = parseFloat(document.getElementById('calc-litres').value);

            const costPerKmEl = document.getElementById('res-cost-per-km');
            const kmPerLitreEl = document.getElementById('res-km-per-litre');

            if(km > 0 && cost > 0) {
                costPerKmEl.innerText = `$${(cost / km).toFixed(2)}`;
            } else {
                costPerKmEl.innerText = '$0.00';
            }

            if(km > 0 && litres > 0) {
                kmPerLitreEl.innerText = `${(km / litres).toFixed(1)}`;
            } else {
                kmPerLitreEl.innerText = '0.0';
            }
        }
    </script>
</body>
</html>
